      operationId: scheduleZoneGet
      responses:
        '200':
          description: Success
      security:
        - basicAuth: []
  /ajax/schedule/zone/create:
    post:
      tags:
        - zoneSchedule
      summary: Create zone schedule
      description: Create new playlist schedule for zone
      operationId: scheduleZoneCreate
      parameters:
        - name: playlistId
          in: query
          required: true
          schema:
            type: number
          description: ID of the playlist to schedule
        - name: timeFrom
          in: query
          required: true
          schema:
            type: string
          description: Start time in HH:mm format
        - name: timeTo
          in: query
          required: false
          schema:
            type: string
          description: End time in HH:mm format
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
          description: Optional start date in YYYY-MM-DD format
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
          description: Optional end date in YYYY-MM-DD format          
        - name: indexInMonth
          in: query
          required: false
          schema:
            type: number
            minimum: -1
            maximum: 31
          description: Optional, for scheduling on n-th occurence of the month
        - name: recurrenceInterval
          in: query
          required: false
          schema:
            type: number
            minimum: 1
            maximum: 99
          description: Optional, for scheduling every n-th occurrence
        - name: monday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Monday
        - name: tuesday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Tuesday
        - name: wednesday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Wednesday
        - name: thursday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Thursday
        - name: friday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Friday
        - name: saturday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Saturday
        - name: sunday
          in: query
          required: true
          schema:
            type: boolean
          description: Whenther the schedule is valid for Sunday
        - name: priority
          in: query
          required: false
          schema:
            type: number
            minimum: 2
            maximum: 4
          description: Priority for resolving conflicts between overlapping schedules. The higher number, the higher priority.

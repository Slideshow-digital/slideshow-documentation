              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  result:
                    type: object
                    properties:
                      id: 
                        type: number
                      playlistId: 
                        type: number
              examples:
                Sample:
                  value: "{\n\t\"success\": true,\n\t\"result\": {\n\t\t\"id\": 1,\n\t\t\"playlistId\": 1\n\t}\n}"
      security:
        - basicAuth: []
  /ajax/content/update:
    post:
      tags:
        - content

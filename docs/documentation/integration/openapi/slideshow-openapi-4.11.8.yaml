      description: Update existing content entry
      operationId: contentUpdate
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: number
          description: ID of the content entry to be updated
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: New name of the content
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ "RANDOM", "ALPHABETICALLY", "STREAM", "DATE_TIME", "WEATHER", "RSS", "TEXT", "VIDEO_INPUT", "YOUTUBE"]
          description: New type of the content
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: New path of the content
      responses:
        '200':
          description: Success
      security:
        - basicAuth: []
  /ajax/content/delete:

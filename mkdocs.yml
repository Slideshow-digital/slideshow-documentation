site_name: Slideshow Documentation
site_description: Documentation for Slideshow - Digital Signage System
copyright: Copyright 2025 © Milan Fabian
theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.svg
  palette:
    scheme: slate
    features:
      - search.suggest
    

plugins:
  - mkdocs-video
  - search
    
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
